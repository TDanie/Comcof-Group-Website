<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 220" width="460" height="220">
  <rect width="460" height="220" fill="#1A0A04"/>
  <g stroke="#B8933E" stroke-opacity=".07" stroke-width="1">
    <path d="M0 55 H460 M0 110 H460 M0 165 H460 M115 0 V220 M230 0 V220 M345 0 V220"/>
  </g>
  <!-- ascending value steps: origin to consumer -->
  <g stroke="#B8933E" stroke-width="1.4" fill="none">
    <path d="M60 178 H150 V148 H240 V118 H330 V88 H408"/>
  </g>
  <!-- bean at origin -->
  <g transform="translate(100 158)">
    <ellipse rx="9" ry="12.5" transform="rotate(-24)" stroke="#D4AF6A" stroke-width="1.5" fill="none"/>
    <path d="M-3.5 -10 C 4 -4, -4 5, 3.5 10.5" stroke="#D4AF6A" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  </g>
  <!-- sack on step 2 -->
  <g transform="translate(193 130)" stroke="#D4AF6A" stroke-width="1.4" fill="none" stroke-linejoin="round">
    <path d="M-10 12 C -12 2, -8 -6, -4 -9 L 4 -9 C 8 -6, 12 2, 10 12 Z"/>
    <path d="M-5 -9 L-3 -13 L3 -13 L5 -9"/>
  </g>
  <!-- roasted bean pair on step 3 -->
  <g transform="translate(283 100)" stroke="#D4AF6A" stroke-width="1.4" fill="none">
    <ellipse rx="6.5" ry="9" transform="rotate(-30) translate(-5 0)"/>
    <ellipse rx="6.5" ry="9" transform="rotate(18) translate(6 2)"/>
  </g>
  <!-- cup at consumer end -->
  <g transform="translate(372 66)" stroke="#D4AF6A" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-11 -2 H11 L9 13 H-9 Z"/>
    <path d="M11 0 C 18 0, 18 9, 10 9"/>
    <path d="M-4 -8 C -4 -11, -1 -11, -1 -8 M4 -8 C 4 -11, 7 -11, 7 -8"/>
  </g>
  <!-- rising arrow -->
  <g stroke="#B8933E" stroke-width="1.2" fill="none">
    <path d="M70 160 C 160 150, 260 120, 388 52" stroke-dasharray="3 6"/>
    <path d="M378 50 L390 51 L385 62" fill="none" stroke-dasharray="none"/>
  </g>
</svg>
